<!-- Notification Bell Component (Alpine.js) -->
{% set _bell_cls = bell_btn_class | default("p-2.5 rounded-xl bg-void-100 dark:bg-void-800 hover:bg-void-200 dark:hover:bg-void-700 transition-all") %}
{% set _bell_icon_cls = bell_icon_class | default("text-void-600 dark:text-void-300") %}
<div x-data="notificationBell()" x-init="init()" class="relative">
    <button @click="open = !open"
            class="{{ _bell_cls }} relative"
            title="Notifications">
        <i class="fas fa-bell {{ _bell_icon_cls }}"></i>
        <!-- Unread badge -->
        <span x-show="unreadCount > 0" x-cloak
              x-text="unreadCount > 99 ? '99+' : unreadCount"
              class="absolute -top-1 -right-1 min-w-[18px] h-[18px] flex items-center justify-center bg-red-500 text-white text-[10px] font-bold rounded-full px-1 leading-none">
        </span>
    </button>

    <!-- Dropdown -->
    <div x-show="open" x-cloak
         @click.outside="open = false"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         class="absolute right-0 mt-2 w-96 max-h-[28rem] bg-white dark:bg-void-800 rounded-xl shadow-2xl border border-void-200 dark:border-void-700 z-50 flex flex-col">

        <!-- Header -->
        <div class="flex items-center justify-between px-4 py-3 border-b border-void-200 dark:border-void-700">
            <h3 class="text-sm font-semibold text-void-900 dark:text-void-100">Notifications</h3>
            <button @click="markAllRead()"
                    x-show="unreadCount > 0"
                    class="text-xs text-nordic-600 dark:text-nordic-400 hover:text-nordic-700 dark:hover:text-nordic-300 font-medium transition-colors">
                Mark all read
            </button>
        </div>

        <!-- Notification List -->
        <div class="flex-1 overflow-y-auto">
            <!-- Empty state -->
            <template x-if="items.length === 0">
                <div class="flex flex-col items-center justify-center py-10 text-void-400 dark:text-void-500">
                    <i class="fas fa-bell-slash text-2xl mb-2"></i>
                    <p class="text-sm">No notifications</p>
                </div>
            </template>

            <!-- Notification items -->
            <template x-for="n in items" :key="n.id">
                <div class="flex gap-3 px-4 py-3 border-b border-void-100 dark:border-void-700/50 hover:bg-void-50 dark:hover:bg-void-700/30 transition-colors"
                     :class="n.is_read ? 'opacity-60' : ''">
                    <!-- Severity icon -->
                    <div class="flex-shrink-0 mt-0.5">
                        <i :class="severityIcon(n.severity)" class="text-sm"></i>
                    </div>

                    <!-- Content -->
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-void-900 dark:text-void-100 truncate" x-text="n.title"></p>
                        <p class="text-xs text-void-500 dark:text-void-400 mt-0.5 line-clamp-2" x-text="n.message"></p>
                        <div class="flex items-center gap-2 mt-1.5">
                            <span x-show="n.source"
                                  x-text="n.source"
                                  class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium bg-void-100 dark:bg-void-700 text-void-600 dark:text-void-300">
                            </span>
                            <span class="text-[10px] text-void-400 dark:text-void-500" x-text="timeAgo(n.created_at)"></span>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="flex-shrink-0 flex items-start gap-1">
                        <a x-show="n.action_url" :href="n.action_url"
                           class="p-1.5 rounded-lg hover:bg-void-200 dark:hover:bg-void-600 text-void-400 hover:text-nordic-500 transition-colors"
                           title="View">
                            <i class="fas fa-arrow-right text-xs"></i>
                        </a>
                        <button x-show="!n.is_read" @click="markRead(n)"
                                class="p-1.5 rounded-lg hover:bg-void-200 dark:hover:bg-void-600 text-void-400 hover:text-nordic-500 transition-colors"
                                title="Mark as read">
                            <i class="fas fa-check text-xs"></i>
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <!-- Footer -->
        <div x-show="hasMore && items.length > 0"
             class="border-t border-void-200 dark:border-void-700 px-4 py-2">
            <button @click="loadMore()"
                    class="w-full text-center text-xs text-nordic-600 dark:text-nordic-400 hover:text-nordic-700 dark:hover:text-nordic-300 font-medium py-1 transition-colors">
                Load more
            </button>
        </div>
    </div>
</div>

<script>
function notificationBell() {
    return {
        open: false,
        unreadCount: 0,
        items: [],
        hasMore: true,
        _offset: 0,
        _sse: null,
        _csrfToken: '',

        init() {
            this._csrfToken = document.querySelector('[name=csrf_token]')?.value
                || document.getElementById('csrf-token')?.value || '';
            // Defer network calls so they don't compete with page rendering
            var self = this;
            setTimeout(function() {
                self.fetchCount();
                self.fetchList();
                self.connectSSE();
            }, 100);
        },

        async fetchCount() {
            try {
                var r = await fetch('/notifications/unread-count');
                var d = await r.json();
                this.unreadCount = d.count || 0;
            } catch (e) { /* silent */ }
        },

        async fetchList() {
            try {
                var r = await fetch('/notifications/list?limit=20&offset=' + this._offset);
                var d = await r.json();
                var nd = (d.data && d.data.notifications) || [];
                if (this._offset === 0) {
                    this.items = nd;
                } else {
                    this.items = this.items.concat(nd);
                }
                this.hasMore = nd.length === 20;
            } catch (e) { /* silent */ }
        },

        loadMore() {
            this._offset += 20;
            this.fetchList();
        },

        async markRead(n) {
            n.is_read = true;
            this.unreadCount = Math.max(0, this.unreadCount - 1);
            try {
                await fetch('/notifications/' + n.id + '/read', {
                    method: 'POST',
                    headers: { 'X-CSRF-Token': this._csrfToken }
                });
            } catch (e) { /* silent */ }
        },

        async markAllRead() {
            this.items.forEach(function(n) { n.is_read = true; });
            this.unreadCount = 0;
            try {
                await fetch('/notifications/read-all', {
                    method: 'POST',
                    headers: { 'X-CSRF-Token': this._csrfToken }
                });
            } catch (e) { /* silent */ }
        },

        connectSSE() {
            var self = this;
            // Close previous connection if any
            if (self._sse) {
                self._sse.close();
                self._sse = null;
            }
            self._sse = new EventSource('/notifications/stream');
            self._sse.onmessage = function(e) {
                try {
                    var n = JSON.parse(e.data);
                    self.items.unshift(n);
                    if (!n.is_read) self.unreadCount++;
                    if ((n.severity === 'error' || n.severity === 'critical') && typeof showToast === 'function') {
                        showToast(n.title, 'error');
                    }
                } catch (err) { /* silent */ }
            };
            // Close SSE on page navigation
            window.addEventListener('beforeunload', function() {
                if (self._sse) {
                    self._sse.close();
                    self._sse = null;
                }
            });
        },

        severityIcon(s) {
            var map = {
                'critical': 'fas fa-circle-exclamation text-red-500',
                'error': 'fas fa-circle-xmark text-red-400',
                'warning': 'fas fa-triangle-exclamation text-amber-400',
                'info': 'fas fa-circle-info text-blue-400'
            };
            return map[s] || 'fas fa-circle-info text-void-400';
        },

        timeAgo(iso) {
            if (!iso) return '';
            var diff = (Date.now() - new Date(iso)) / 1000;
            if (diff < 60) return 'just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            return Math.floor(diff / 86400) + 'd ago';
        }
    };
}
</script>

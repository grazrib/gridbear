<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error - GridBear</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">

    <!-- Geist Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.2.0/dist/fonts/geist-sans/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.2.0/dist/fonts/geist-mono/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        nordic: {
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                        },
                        void: {
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        frost: {
                            400: '#38bdf8',
                            500: '#0ea5e9',
                        },
                        ember: {
                            400: '#fb923c',
                            500: '#f97316',
                        }
                    },
                    fontFamily: {
                        sans: ['Geist Sans', 'system-ui', 'sans-serif'],
                        mono: ['Geist Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        .bg-grid {
            background-image:
                linear-gradient(rgba(239, 68, 68, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="font-sans antialiased bg-void-950 min-h-screen flex items-center justify-center p-4">
    <!-- Background -->
    <div class="fixed inset-0 bg-grid"></div>
    <div class="fixed inset-0">
        <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-red-500/10 rounded-full blur-[100px] animate-pulse"></div>
        <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-ember-500/10 rounded-full blur-[100px] animate-pulse" style="animation-delay: 2s;"></div>
    </div>

    <!-- Card -->
    <div class="relative w-full max-w-md">
        <div class="absolute inset-0 bg-gradient-to-r from-red-500/20 via-ember-500/20 to-red-500/20 rounded-3xl blur-xl transform scale-105"></div>

        <div class="relative glass-card rounded-3xl border border-white/10 overflow-hidden">
            <div class="p-8 text-center">
                <div class="w-20 h-20 mx-auto mb-6 rounded-2xl bg-red-500/10 flex items-center justify-center">
                    <i class="fas fa-times text-red-500 text-3xl"></i>
                </div>

                <h1 class="text-2xl font-semibold text-red-500 mb-4">Error</h1>

                <div class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400">
                    <span>{{ error }}</span>
                </div>

                <p class="text-slate-400 text-sm">Return to the chat and try again or contact the administrator.</p>
            </div>
        </div>
    </div>
</body>
</html>

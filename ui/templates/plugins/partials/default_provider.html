<!-- Default Provider Selection — expects: providers, base_plugin_name, plugin -->
{% if providers %}
{% set current_default = plugin.current_config.get('default_provider', '') %}
<div class="rounded-2xl bg-white dark:bg-void-900/50 border border-void-200 dark:border-void-800 overflow-hidden">
    <div class="p-5 border-b border-void-200 dark:border-void-800 bg-gradient-to-r from-nordic-500/5 to-transparent">
        <h3 class="font-semibold text-void-900 dark:text-white flex items-center gap-2">
            <i class="fas fa-star text-nordic-500"></i>
            Default Provider
        </h3>
        <p class="text-sm text-void-500 dark:text-void-400 mt-1">Global default — agents can override this in their YAML config</p>
    </div>
    <form method="POST" action="/plugins/{{ base_plugin_name }}">
        {% include "partials/csrf_field.html" %}
        <div class="p-5">
            <select name="default_provider"
                    class="w-full bg-void-50 dark:bg-void-800/50 border border-void-200 dark:border-void-700 rounded-xl py-2.5 px-4 text-void-900 dark:text-white focus:outline-none focus:border-nordic-500/50 transition-all">
                <option value="" {% if not current_default %}selected{% endif %}>— None (first available) —</option>
                {% for provider in providers %}
                <option value="{{ provider.name }}" {% if current_default == provider.name %}selected{% endif %}>
                    {{ provider.display_name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="px-5 pb-5">
            <button type="submit"
                    class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-nordic-500 hover:bg-nordic-600 text-white font-medium transition-all shadow-lg shadow-nordic-500/20">
                <i class="fas fa-save"></i>
                Save Default
            </button>
        </div>
    </form>
</div>
{% endif %}
